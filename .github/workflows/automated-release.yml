name: Automated APK Release (Main)

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para gerar changelog completo

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🏷️ Determine & Bump Version
        id: versioning
        run: |
          OLD_VERSION=$(node -p "require('./package.json').version")
          echo "Versão antiga: $OLD_VERSION"
          
          # Incrementa a versão no package.json automaticamente (patch)
          npm version patch --no-git-tag-version
          
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          # Sincroniza a versão no app.json também
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('./app.json', 'utf8'));
            appJson.expo.version = '$NEW_VERSION';
            fs.writeFileSync('./app.json', JSON.stringify(appJson, null, 2) + '\n');
          "
          
          echo "Nova versão: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "VERSION_TAG=v$NEW_VERSION" >> $GITHUB_ENV

      - name: 📝 Generate Professional Changelog
        id: changelog
        run: |
          # Pega a última tag para comparar
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [[ -z "$LAST_TAG" ]]; then
            git log --pretty=format:"* %s (%h)" > raw_log.txt
          else
            git log $LAST_TAG..HEAD --pretty=format:"* %s (%h)" > raw_log.txt
          fi

          # Executa o script de changelog
          node .github/scripts/generate-changelog.js
          
          echo "CHANGELOG_PATH=changelog.md" >> $GITHUB_ENV

      - name: 📦 Install dependencies
        run: npm install

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 🚀 Build APK Localmente (GitHub Runner)
        id: build_apk
        run: |
          echo "🏗️ Iniciando Local Build (isso pode levar alguns minutos)..."
          
          # Executa o build localmente
          # Nota: O profile 'preview' deve estar configurado no eas.json para gerar APK
          eas build --platform android --profile preview --local --non-interactive --output="./StrideSync-release.apk"
          
          if [[ ! -f "./StrideSync-release.apk" ]]; then
            echo "❌ Erro: O arquivo APK não foi gerado pelo EAS Local."
            exit 1
          fi
          
          echo "APK_LOCAL_PATH=$(pwd)/StrideSync-release.apk" >> $GITHUB_ENV
          echo "✅ Build local finalizado com sucesso."
          
      - name: 📱 Preparar Markdown do Release
        id: prepare_release
        run: |
          {
            cat changelog.md
            echo ""
            echo "---"
            echo "### 📱 Instalação (Android)"
            echo "Baixe o arquivo **StrideSync-v${{ env.NEW_VERSION }}.apk** anexado abaixo para instalar no seu dispositivo."
            echo ""
            echo "> [!NOTE]"
            echo "> Esta versão foi gerada automaticamente via GitHub Actions ao detectar mudanças na branch main."
          } > release_body.md
          
          echo "RELEASE_BODY_PATH=release_body.md" >> $GITHUB_ENV

      - name: 📥 Rename & Prepare Artifact
        run: |
          APK_NAME="StrideSync-v${{ env.NEW_VERSION }}.apk"
          mv "${{ env.APK_LOCAL_PATH }}" "$APK_NAME"
          echo "FINAL_APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: 📝 Commit version bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json app.json
          # O commit de bump não deve triggar o workflow novamente
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: StrideSync v${{ env.NEW_VERSION }}
          body_path: ${{ env.RELEASE_BODY_PATH }}
          files: ${{ env.FINAL_APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
